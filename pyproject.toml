[tool.uv.workspace]
members = ["cafleet"]

[tool.uv.sources]
cafleet = { workspace = true }

[dependency-groups]
dev = [
    "cafleet",
    "pytest>=9.0.2",
    "pytest-asyncio>=1.3.0",
    "ruff>=0.11.0",
    "ty>=0.0.26",
]

[tool.ty]

[tool.ty.environment]
python-version = "3.12"

[tool.ty.src]
include = ["cafleet/src"]

[tool.ty.analysis]
# Suppress errors for third-party libraries without type stubs.
# Add more patterns as needed when new dependencies are introduced.
allowed-unresolved-imports = [
    "pydantic_settings.*",
    "starlette.*",
    "fastapi.*",
    "uvicorn",
    "click.*",
    "httpx.*",
]

[tool.ruff.lint]
extend-select = ["I", "UP", "SIM", "B", "PERF", "RET", "N", "C4", "ERA", "PT", "PIE", "PTH"]

[tool.ruff.lint.isort]
known-first-party = ["cafleet"]
