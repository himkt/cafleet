[tasks.dev]
run = "uv run uvicorn cafleet.server:app --host 127.0.0.1 --port 8000"
description = "Start the admin WebUI server on 127.0.0.1:8000 (no hot-reload; restart manually between edits)"

[tasks.test]
run = "uv run python -m pytest"
description = "Run all tests"

[tasks.lint]
run = [
  "uv run ruff check .",
  "uv run ruff format --check .",
]
description = "Run ruff linter and format check"

[tasks.format]
run = "uv run ruff format ."
description = "Format code with ruff"

[tasks.typecheck]
run = "uv run ty check"
description = "Run ty type checker"

[tasks.sync]
run = "uv sync"
description = "Sync cafleet project dependencies"

[tasks.install]
run = "uv tool install --reinstall --editable ."
description = "Install the cafleet CLI as an editable uv tool (source edits take effect without a second reinstall)"

[tasks.build]
run = "uv build --wheel"
description = "Build the cafleet wheel"

[tasks.publish]
run = "uv publish"
description = "Publish cafleet"
