[tasks.dev]
run = "uv run uvicorn cafleet.server:app --host 127.0.0.1 --port 8000"
description = "Start the admin WebUI server on 127.0.0.1:8000 (no hot-reload; restart manually between edits)"

[tasks.test]
run = "uv run python -m pytest"
description = "Run all tests"

[tasks.lint]
run = [
  "uv --preview-features format format --diff",
  "uvx ruff check",
  "uv run mypy src",
]
description = "Check formatting, lint, and type-check"

[tasks.format]
run = [
  "uv --preview-features format format",
  "uvx ruff check --fix",
]
description = "Auto-format and fix lint issues"
